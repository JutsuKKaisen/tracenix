version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tracenix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracenix}
      POSTGRES_USER: ${POSTGRES_USER:-tracenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /var/www/tracenix/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracenix} -d ${POSTGRES_DB:-tracenix}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tracenix-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracenix-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      POSTGRES_DB: ${POSTGRES_DB:-tracenix}
      POSTGRES_USER: ${POSTGRES_USER:-tracenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tracenix}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      ALLOWED_MIME_TYPES: ${ALLOWED_MIME_TYPES:-application/pdf,image/png,image/jpeg,application/vnd.openxmlformats-officedocument.wordprocessingml.document}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://tracenix.digitalizelabs.com}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_FULL_NAME: ${SEED_ADMIN_FULL_NAME:-System Admin}
    volumes:
      - /var/www/tracenix/data/uploads:/app/data/uploads
    expose:
      - "8000"
    networks:
      - tracenix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    container_name: tracenix-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    expose:
      - "3000"
    networks:
      - tracenix-network

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: tracenix-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:18080:80"
    volumes:
      - ./deploy/nginx/conf.d/tracenix.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/tracenix/data/uploads:/var/www/uploads:ro
    networks:
      - tracenix-network

networks:
  tracenix-network:
    driver: bridge